<!DOCTYPE html>
<html>
<body style="font-family: sans-serif; padding: 20px;">
    <h3>Gemini Ultra-Simple</h3>
    <input type="password" id="key" placeholder="Enter your API Key" style="width: 100%; padding: 10px; margin-bottom: 10px;">
    <textarea id="prompt" placeholder="Ask Gemini..." style="width: 100%; height: 100px; padding: 10px; margin-bottom: 10px;"></textarea>
    <button onclick="ask()" style="padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px;">Send</button>
    <div id="result" style="margin-top: 20px; padding: 10px; border: 1px solid #ccc;"></div>

    <script>
        async function ask() {
            const key = document.getElementById('key').value;
            const prompt = document.getElementById('prompt').value;
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`;
            
            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({contents: [{parts: [{text: prompt}]}]})
                });
                const data = await res.json();
                document.getElementById('result').innerText = data.candidates[0].content.parts[0].text;
            } catch (e) {
                document.getElementById('result').innerText = "Error: " + e.message;
            }
        }
    </script>
</body>
</html>
